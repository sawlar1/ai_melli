# ============================================================
# 📝 AI Melli — Text Generation
# ============================================================

name: "📝 Text Generation"

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: "Your prompt"
        required: true
        type: string

      model:
        description: "AI Model"
        required: true
        default: "openai"
        type: choice
        options:
          - openai
          - openai-large
          - openai-reasoning
          - openai-fast

      temperature:
        description: "Creativity (0.0 - 1.5)"
        required: false
        default: "0.8"
        type: string

      system_message:
        description: "System message (role of AI)"
        required: false
        default: "You are a creative and helpful AI assistant. Write detailed, well-structured, and engaging content. Use markdown formatting when appropriate."
        type: string

      upload_method:
        description: "Upload Method"
        required: true
        default: "repository"
        type: choice
        options:
          - repository
          - release

      release_tag:
        description: "Release Tag (empty = auto)"
        required: false
        default: ""
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: "📁 Prepare scripts"
        shell: bash
        run: mkdir -p scripts

      - name: "🐍 Create text generator script"
        shell: bash
        run: |
          cat > scripts/generate_text.py << 'PYEOF'
          #!/usr/bin/env python3
          import urllib.request, json, sys, os, time

          def generate_text(prompt, model="openai", temperature=0.8, system_message=None):
              if not system_message:
                  system_message = "You are a creative and helpful AI assistant."
              payload = json.dumps({
                  "messages": [
                      {"role": "system", "content": system_message},
                      {"role": "user", "content": prompt}
                  ],
                  "model": model,
                  "temperature": temperature
              }).encode("utf-8")
              url = f"https://text.pollinations.ai/{model}"
              req = urllib.request.Request(url, data=payload, method="POST")
              req.add_header("Content-Type", "application/json")
              req.add_header("User-Agent", "AI-Melli/1.0")
              print(f"Sending to model: {model}")
              with urllib.request.urlopen(req, timeout=120) as resp:
                  raw = resp.read().decode("utf-8")
              try:
                  parsed = json.loads(raw)
                  if isinstance(parsed, dict):
                      text = parsed.get("choices", [{}])[0].get("message", {}).get("content", "")
                      if not text: text = parsed.get("content", "")
                      if not text: text = json.dumps(parsed, ensure_ascii=False)
                  else:
                      text = str(parsed)
              except (json.JSONDecodeError, IndexError, KeyError):
                  text = raw
              return text

          def main():
              config_path = sys.argv[1] if len(sys.argv) > 1 else "/tmp/ai_melli_config.json"
              with open(config_path) as f:
                  cfg = json.load(f)
              prompt = cfg["prompt"]
              model = cfg.get("model", "openai")
              temp = float(cfg.get("temperature", "0.8"))
              sys_msg = cfg.get("system_message", "")
              out_dir = cfg.get("output_dir", "output")
              os.makedirs(out_dir, exist_ok=True)
              text = generate_text(prompt, model, temp, sys_msg or None)
              ts = time.strftime("%Y%m%d_%H%M%S")
              md_path = os.path.join(out_dir, f"generated_{ts}.md")
              with open(md_path, "w", encoding="utf-8") as f:
                  f.write(f"# Generated by AI Melli\n\n")
                  f.write(f"| Key | Value |\n|-----|-------|\n")
                  f.write(f"| **Model** | {model} |\n")
                  f.write(f"| **Date** | {time.strftime('%Y-%m-%d %H:%M:%S')} |\n")
                  f.write(f"| **Prompt** | {prompt} |\n\n---\n\n")
                  f.write(text)
              raw_path = os.path.join(out_dir, f"raw_{ts}.json")
              with open(raw_path, "w", encoding="utf-8") as f:
                  f.write(text)
              chars, words = len(text), len(text.split())
              print(f"\n=== Text Generated ===")
              print(f"Chars: {chars}, Words: {words}")
              print(f"File: {md_path}")
              print(f"\n--- Preview ---\n{text[:500]}")
              with open("/tmp/ai_melli_result.json", "w") as f:
                  json.dump({"file": md_path, "chars": chars, "words": words}, f)

          if __name__ == "__main__":
              main()
          PYEOF

      # ======== Build Config & Run ========
      - name: "📝 Generate Text"
        id: gen
        shell: bash
        run: |
          jq -n \
            --arg prompt "${{ github.event.inputs.prompt }}" \
            --arg model "${{ github.event.inputs.model }}" \
            --arg temp "${{ github.event.inputs.temperature }}" \
            --arg sys "${{ github.event.inputs.system_message }}" \
            --arg outdir "output" \
            '{
              prompt: $prompt,
              model: $model,
              temperature: ($temp | tonumber),
              system_message: $sys,
              output_dir: $outdir
            }' > /tmp/ai_melli_config.json

          echo "Config:"
          cat /tmp/ai_melli_config.json

          python3 scripts/generate_text.py /tmp/ai_melli_config.json

          if [ -f /tmp/ai_melli_result.json ]; then
            echo "chars=$(jq -r '.chars' /tmp/ai_melli_result.json)" >> "$GITHUB_OUTPUT"
            echo "words=$(jq -r '.words' /tmp/ai_melli_result.json)" >> "$GITHUB_OUTPUT"
          fi

      # ======== Summary ========
      - name: "📊 Summary"
        if: always()
        shell: bash
        run: |
          echo "╔═══════════════════════════════════════╗"
          echo "║   Text Generation — Complete          ║"
          echo "╠═══════════════════════════════════════╣"
          echo "║ Model     : ${{ github.event.inputs.model }}"
          echo "║ Characters: ${{ steps.gen.outputs.chars }}"
          echo "║ Words     : ${{ steps.gen.outputs.words }}"
          echo "╚═══════════════════════════════════════╝"

      # ======== Upload to Repository ========
      - name: "📦 Push to Repository"
        if: github.event.inputs.upload_method == 'repository'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git commit -m "Text: ${{ github.event.inputs.prompt }} [skip ci]" || echo "No changes"
          git push

      # ======== Upload to Release ========
      - name: "🚀 Upload to Release"
        if: github.event.inputs.upload_method == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag != '' && github.event.inputs.release_tag || format('txt-{0}', github.run_number) }}
          name: "AI Text — ${{ github.event.inputs.model }}"
          body: |
            ## Generated Text
            - **Model:** ${{ github.event.inputs.model }}
            - **Prompt:** ${{ github.event.inputs.prompt }}
            - **Characters:** ${{ steps.gen.outputs.chars }}
            - **Words:** ${{ steps.gen.outputs.words }}
          files: output/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ======== Cleanup ========
      - name: "🧹 Cleanup"
        if: always()
        run: rm -rf output /tmp/ai_melli_*.json
